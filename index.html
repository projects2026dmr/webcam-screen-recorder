    <!-- Structured Data: FAQPage (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is this webcam recorder completely free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Our webcam and screen recorder is 100% free to use. There are no hidden fees, no watermarks, and no time limits on your recordings."

            "text": "No installation required. Our browser-based screen capture tool works entirely in your web browser. Just open the website, choose your recording mode, and start capturing. No downloads, no plugins, no browser extensions needed."
          }
        },

          "name": "Can I record both my screen and webcam at the same time?",

            "text": "Absolutely! You can record your screen with a webcam overlay (picture-in-picture), with customizable position (any corner) and size controls. Perfect for YouTube tutorials, online courses, product demos, and presentations."

        },

          "@type": "Question",
          "name": "Is my recording stored online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. All recordings are processed and stored locally in your browser using IndexedDB. We never upload your videos to any server. Your data stays 100% private on your device until you choose to download."
          }
        },
        {
          "@type": "Question",
          "name": "Can I trim my recording?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Our built-in trim editor lets you select start and end points to cut your recording. Export only the parts you need without any external software."
          }
        },
        {
          "@type": "Question",
          "name": "What browsers support this screen recorder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our recorder works on all modern browsers including Google Chrome, Microsoft Edge, and Mozilla Firefox. For the best experience with all features, we recommend using the latest version of Chrome."
          }
        },
        {
          "@type": "Question",
          "name": "What resolution can I record in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can record in HD quality up to 4K resolution, with presets for 720p, 1080p, 1440p, 4K, or Original (native resolution). Choose from Low, Medium, or High bitrate options for optimal file size and quality."

            "@type": "Answer",
            "text": "Our countdown overlay is now displayed directly on your recording stream! When you select a tab or window, you'll see the 5-4-3-2-1 countdown appear on that content, so you always know when recording starts."
          }
        }
      ]
    }
